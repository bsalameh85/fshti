<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>معهد علوم المستقبل العالي للتدريب</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:10px;
}

.container{
width:100%;
max-width:650px;
background:#fff;
border-radius:18px;
padding:20px 15px;
box-shadow:0 20px 50px rgba(0,0,0,.15);
}

.institute-header{
text-align:center;
margin-bottom:20px;
padding-bottom:15px;
border-bottom:2px solid #e5e7eb;
}

.institute-header h2{
font-size:22px;
color:#2563eb;
margin-bottom:5px;
}

.institute-header p{
font-size:14px;
color:#64748b;
}

.title{
text-align:center;
font-size:22px;
margin-bottom:20px;
color:#0f172a;
}

.notice{
background:#f8fafc;
border-right:6px solid #2563eb;
padding:15px;
border-radius:12px;
font-size:14px;
line-height:2;
margin-bottom:20px;
color:#334155;
}

.form-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
color:#1e293b;
font-size:15px;
}

input[type=text],
input[type=date],
input[type=tel]{
width:100%;
padding:15px;
border:1px solid #d1d5db;
border-radius:12px;
font-size:16px;
min-height:52px;
}

input:focus{
outline:none;
border-color:#2563eb;
box-shadow:0 0 12px rgba(37,99,235,.2);
}

.option{
border:2px solid #e5e7eb;
padding:16px;
border-radius:12px;
margin-bottom:12px;
cursor:pointer;
font-size:15px;
}

.option input{
transform:scale(1.3);
margin-left:10px;
}

#customDateBox{
display:none;
margin-top:10px;
padding:15px;
background:#f8fafc;
border-radius:12px;
}

button{
width:100%;
height:56px;
background:#2563eb;
color:#fff;
border:none;
border-radius:12px;
font-size:18px;
font-weight:700;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.loading{
display:none;
text-align:center;
margin-top:10px;
color:#2563eb;
font-weight:700;
}

.success{
display:none;
text-align:center;
margin-top:15px;
padding:12px;
background:#dcfce7;
color:#166534;
border-radius:12px;
font-weight:bold;
}

.footer{
text-align:center;
margin-top:15px;
font-size:12px;
color:#64748b;
}

</style>
</head>

<body>

<div class="container">

<div class="institute-header">
<h2>معهد علوم المستقبل العالي للتدريب</h2>
<p>نموذج اختيار موعد الدورة البديلة</p>
</div>

<h1 class="title">تعديل بيانات الدورة</h1>

<div class="notice">
السلام عليكم ورحمة الله وبركاته<br><br>
يرجى اختيار أحد الخيارات التالية لإعادة جدولة الدورة.
</div>

<form id="form">

<div class="form-group">
<label>الاسم الرباعي</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>رقم الهوية</label>
<input type="tel" id="nationalId" inputmode="numeric" required>
</div>

<div class="form-group">

<label>اختر الخيار</label>

<div class="option">
<input type="radio" name="option" value="تاريخ يحدده المشارك" required>
تاريخ يحدده المشارك
</div>

<div id="customDateBox">
<label>حدد التاريخ</label>
<input type="date" id="customDate">
</div>

<div class="option">
<input type="radio" name="option" value="2026/06/08">
2026/06/08
</div>

<div class="option">
<input type="radio" name="option" value="2026/06/05">
2026/06/05
</div>

</div>

<button type="submit">إرسال الطلب</button>

<div class="loading" id="loading">جاري الإرسال...</div>
<div class="success" id="success">تم الإرسال بنجاح</div>

</form>

<div class="footer">جميع الحقوق محفوظة</div>

</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyjIfYfucjw1m92u8nP8Tzid9x4iq6FfT9lNsCbJz3xOK4cz06xcN_6NH6JGNSsW2gc4A/exec";

document.querySelectorAll('input[name="option"]').forEach(radio=>{
radio.addEventListener("change",function(){

const box = document.getElementById("customDateBox");
const date = document.getElementById("customDate");

if(this.value === "تاريخ يحدده المشارك"){
box.style.display = "block";
date.required = true;
}else{
box.style.display = "none";
date.required = false;
date.value = "";
}

});
});

document.getElementById("form").addEventListener("submit", async function(e){
e.preventDefault();

const selected = document.querySelector('input[name="option"]:checked').value;

const data = {
name: document.getElementById("name").value,
nationalId: document.getElementById("nationalId").value,
option: selected,
customDate: selected === "تاريخ يحدده المشارك"
? document.getElementById("customDate").value
: ""
};

document.getElementById("loading").style.display = "block";

try {

await fetch(WEB_APP_URL, {
method: "POST",
mode: "no-cors",
body: JSON.stringify(data)
});

document.getElementById("loading").style.display = "none";
document.getElementById("success").style.display = "block";

document.getElementById("form").reset();
document.getElementById("customDateBox").style.display = "none";

} catch (err) {

document.getElementById("loading").style.display = "none";
alert("حدث خطأ أثناء الإرسال");

}

});

</script>

</body>
</html>
