<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نموذج اختيار موعد الدورة البديلة</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:10px;
}

.container{
width:100%;
max-width:650px;
background:#fff;
border-radius:18px;
padding:15px 15px; /* تم تقليل الحشو العلوي والسفلي */
box-shadow:0 20px 50px rgba(0,0,0,.15);
}

.institute-header{
text-align:center;
margin-bottom:12px; /* تم تقليله من 20 */
padding-bottom:10px; /* تم تقليله من 15 */
border-bottom:2px solid #e5e7eb;
}

.logo {
max-width: 110px; /* تم تصغير الشعار قليلاً لتوفير مساحة عمودية */
height: auto;
margin-bottom: 8px;
}

.institute-header p{
font-size:15px;
font-weight: 700;
color:#2563eb;
}

.title{
text-align:center;
font-size:18px; /* تم تصغير الخط قليلاً */
margin-bottom:12px; /* تم تقليله من 20 */
color:#0f172a;
}

.notice{
background:#f8fafc;
border-right:6px solid #2563eb;
padding:10px 12px; /* تم تقليل الحشو الداخلي */
border-radius:12px;
font-size:13px;
line-height:1.6; /* تم تقليل تباعد الأسطر لتوفير مساحة */
margin-bottom:12px; /* تم تقليله من 20 */
color:#334155;
}

.form-group{
margin-bottom:10px; /* تم تقليل المسافة بين الحقول من 18 إلى 10 */
}

label{
display:block;
margin-bottom:5px; /* تم تقليله من 8 */
font-weight:600;
color:#1e293b;
font-size:14px;
}

input[type=text],
input[type=date],
input[type=tel]{
width:100%;
padding:10px 12px; /* تم تقليله من 15 */
border:1px solid #d1d5db;
border-radius:10px;
font-size:15px;
min-height:42px; /* تم تقليله من 52 لتوفير مساحة عمودية */
}

input:focus{
outline:none;
border-color:#2563eb;
box-shadow:0 0 12px rgba(37,99,235,.2);
}

/* تعديل خيارات الراديو لتصبح متراصة وقريبة من بعضها */
.option{
border:1px solid #e5e7eb;
padding:10px 12px; /* تم تقليل الحشو الداخلي من 16 */
border-radius:10px;
margin-bottom:6px; /* تم تقليل المسافة بين الخيارات من 12 إلى 6 */
cursor:pointer;
font-size:14px;
display: flex;
align-items: center;
}

.option input{
transform:scale(1.1); /* تم تصغير حجم الدائرة قليلاً لتتناسب مع الحجم الجديد */
margin-left:8px;
}

#customDateBox{
display:none;
margin-top:5px;
margin-bottom:8px;
padding:10px;
background:#f8fafc;
border-radius:10px;
}

button{
width:100%;
height:46px; /* تم تقليله من 56 لتوفير مساحة */
background:#2563eb;
color:#fff;
border:none;
border-radius:10px;
font-size:16px;
font-weight:700;
cursor:pointer;
margin-top:5px;
}

button:hover{
background:#1d4ed8;
}

.loading{
display:none;
text-align:center;
margin-top:8px;
color:#2563eb;
font-weight:700;
}

.success{
display:none;
text-align:center;
margin-top:10px;
padding:10px;
background:#dcfce7;
color:#166534;
border-radius:10px;
font-weight:bold;
}

.footer{
text-align:center;
margin-top:10px;
font-size:11px;
color:#64748b;
}

</style>
</head>

<body>

<div class="container">

<div class="institute-header">
<img src="sh.png" alt="شعار المعهد" class="logo">
<p>نموذج اختيار موعد الدورة البديلة</p>
</div>

<h1 class="title">تعديل بيانات الدورة</h1>

<div class="notice">
السلام عليكم ورحمة الله وبركاته. يرجى تعبئة البيانات واختيار الموعد المناسب لإعادة جدولة الدورة.
</div>

<form id="form">

<div class="form-group">
<label>الاسم الرباعي</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>رقم الهوية</label>
<input type="tel" id="nationalId" inputmode="numeric" pattern="[0-9]{10}" maxlength="10" required>
</div>

<div class="form-group">

<label>اختر الخيار المناسب</label>

<div class="option">
<input type="radio" name="option" value="تاريخ يحدده المشارك" required>
تاريخ يحدده المشارك
</div>

<div id="customDateBox">
<label>حدد التاريخ</label>
<input type="date" id="customDate">
</div>

<div class="option">
<input type="radio" name="option" value="2026/06/10">
2026/06/10
</div>

<div class="option">
<input type="radio" name="option" value="2026/06/07">
2026/06/07
</div>

</div>

<button type="submit">إرسال الطلب</button>

<div class="loading" id="loading">جاري الإرسال...</div>
<div class="success" id="success">تم إرسال الطلب بنجاح</div>

</form>

<div class="footer">جميع الحقوق محفوظة © 2026</div>

</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyjIfYfucjw1m92u8nP8Tzid9x4iq6FfT9lNsCbJz3xOK4cz06xcN_6NH6JGNSsW2gc4A/exec";

/* إظهار حقل التاريخ */
document.querySelectorAll('input[name="option"]').forEach(radio=>{
radio.addEventListener("change",function(){

const box = document.getElementById("customDateBox");
const date = document.getElementById("customDate");

if(this.value === "تاريخ يحدده المشارك"){
box.style.display = "block";
date.required = true;
}else{
box.style.display = "none";
date.required = false;
date.value = "";
}

});
});

/* إرسال البيانات */
document.getElementById("form").addEventListener("submit", async function(e){
e.preventDefault();

const name = document.getElementById("name").value;
const nationalId = document.getElementById("nationalId").value;

/* تحقق الهوية */
if(nationalId.length !== 10 || !/^\d+$/.test(nationalId)){
alert("رقم الهوية يجب أن يكون 10 أرقام");
return;
}

const selected = document.querySelector('input[name="option"]:checked').value;

const data = {
name,
nationalId,
option: selected,
customDate: selected === "تاريخ يحدده المشارك"
? document.getElementById("customDate").value
: ""
};

document.getElementById("loading").style.display = "block";

try {

await fetch(WEB_APP_URL, {
method: "POST",
mode: "no-cors",
body: JSON.stringify(data)
});

document.getElementById("loading").style.display = "none";
document.getElementById("success").style.display = "block";

document.getElementById("form").reset();
document.getElementById("customDateBox").style.display = "none";

} catch (err) {

document.getElementById("loading").style.display = "none";
alert("حدث خطأ أثناء الإرسال");

}

});

</script>

</body>
</html>
